# E.g.
# VOLUME_ROOT_DIR=$(pwd) docker compose -f ./database/compose.yml -f ./Floto.Api/compose.yml up

name: floto-api

services:
  floto-api:
    image: floto-api:local
    build:
      context: ../
      dockerfile: ../Dockerfile
      target: final
      args:
        ASMVERSION: 1.0.0
    container_name: floto-api
    ports:
      - 8080:8080
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Stack: local
      COSMOSDB_CONNECTION_STRING: 'AccountEndpoint=http://floto-db:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==;'
    depends_on:
      floto-db-migrator:
        condition: service_completed_successfully
